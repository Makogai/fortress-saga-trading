<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512"><defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1c1917"></stop>
      <stop offset="100%" stop-color="#0f172a"></stop>
    </radialGradient>

    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EDCE99"></stop>
      <stop offset="100%" stop-color="#D69858"></stop>
    </linearGradient>

    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F2E3D1"></stop>
      <stop offset="100%" stop-color="#EAD7C2"></stop>
    </linearGradient>

    <!-- Shield glow -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <!-- Subtle shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.25"></feDropShadow>
    </filter>
  </defs><rect width="512" height="512" rx="110" fill="url(#bgGrad)"></rect><path d="M256 110
       L360 150
       L360 290
       Q360 360 256 420
       Q152 360 152 290
       L152 150
       Z" fill="url(#shieldGrad)" filter="url(#shadow)"></path><rect x="230" y="105" width="52" height="20" rx="4" fill="#EDCE99" opacity="0.7"></rect><rect x="206" y="180" width="100" height="160" rx="16" fill="url(#cardGrad)"></rect><rect x="206" y="180" width="6" height="160" rx="3" fill="#ffffff" opacity="0.25"></rect></svg>